name: build

on:
  workflow_dispatch:
  push:
    branches: [ master, integration ]
  pull_request:
    branches: [ master, integration ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'

    - name: install dependencies
      run: |
        sudo apt-get update -y
        sudo apt-get install -y xorg-dev libxkbcommon-dev libwayland-dev
        # lavapipe (Mesa software Vulkan ICD) + xvfb to run the gpu-tests headless
        sudo apt-get install -y mesa-vulkan-drivers vulkan-tools xvfb

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@v1
      with:
        # set sdk-version, avoid slang-bug introduced in 1.4.350
        vulkan_version: 1.4.341.1
        # optional_components: com.lunarg.vulkan.vma
        # install_runtime: true
        cache: true
        # keep validation layers (the gpu-tests enable them); stripdown would delete them.
        stripdown: false

        # You can install a software rasterizer.
        # install_swiftshader: true
        # install_lavapipe: true
        
    - name: Configure CMake
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      # Build your program with the given configuration
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}

    - name: Vulkan info
      # non-fatal: surface which ICD/driver + Vulkan version the loader actually sees
      run: vulkaninfo --summary || true

    - name: Test
      working-directory: ${{github.workspace}}/build
      # the runner has no GPU, so lavapipe is the only Vulkan ICD and the loader auto-discovers it
      # (no VK_ICD_FILENAMES override - forcing a path risks finding zero ICDs).
      # xvfb provides a virtual display for the windowing/swapchain tests.
      # exclude TestPBRDeferred: it hard-requires ray-tracing + mesh-shader extensions, which lavapipe lacks.
      run: xvfb-run -a ctest -C ${{env.BUILD_TYPE}} --output-on-failure -E "TestPBRDeferred"

